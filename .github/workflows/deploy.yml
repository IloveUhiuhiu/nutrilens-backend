name: Deploy NutriLens Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_BACKEND_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="$HOME/nutrilens-backend"
            REPO_URL="https://github.com/IloveUhiuhiu/nutrilens-backend.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              cd "$APP_DIR"
              git init
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            else
              cd "$APP_DIR"
            fi

            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "🚨 LỖI: Không tìm thấy file .env!"
              exit 1
            fi

            docker compose down
            docker compose up --build -d

            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput

            docker image prune -f