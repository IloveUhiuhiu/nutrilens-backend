          type: string
        data:
          $ref: '#/components/schemas/AdminOTPListPage'
        errors:
          nullable: true
      required:
      - data
      - errors
      - message
      - status_code
    AdminPasswordReset:
      type: object
      properties:
        new_password:
          type: string
