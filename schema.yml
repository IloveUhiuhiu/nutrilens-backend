components:
  schemas:
    ActivityLevel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        level_name:
          type: string
          maxLength: 50
        description:
          type: string
        ratio:
          type: number
          format: double
          description: Hệ số PAL (Physical Activity Level)
      required:
      - id
      - level_name
      - ratio
    ActivityLevelListResponse:
      type: object
      properties:
        status_code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/ActivityLevel'
          readOnly: true
        errors:
          nullable: true
      required:
      - data
      - errors
      - message
      - status_code
    ActivityLevelResponse:
      type: object
      properties:
        status_code:
          type: integer
        message:
          type: string
        data:
          allOf:
          - $ref: '#/components/schemas/ActivityLevel'
          readOnly: true
        errors:
          nullable: true
      required:
      - data
      - errors
      - message
      - status_code
    AdminAccountDetail:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        full_name:
          type: string
          nullable: true
          maxLength: 150
        avatar_url:
          type: string
          format: uri
          maxLength: 1000
        email:
          type: string
          format: email
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        gender:
          $ref: '#/components/schemas/GenderEnum'
        birth_date:
          type: string
          format: date
          nullable: true
        height:
          type: number
          format: double
          description: Height in cm
        current_weight:
          type: number
          format: double
          readOnly: true
        bmi:
          type: number
          format: double
          readOnly: true
        activity_level:
          allOf:
          - $ref: '#/components/schemas/ActivityLevel'
          readOnly: true
        tdee:
          type: number
          format: double
          description: Total Daily Energy Expenditure
        role:
          type: string
          readOnly: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        weight_histories:
          type: array
          items:
            $ref: '#/components/schemas/WeightHistory'
          readOnly: true
        daily_logs:
          type: string
          readOnly: true
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
      required:
      - activity_level
      - bmi
      - current_weight
      - daily_logs
      - email
      - id
      - role
      - weight_histories
    AdminAccountDetailResponse:
      type: object
      properties:
        status_code:
          type: integer
        message:
          type: string
        data:
          allOf:
          - $ref: '#/components/schemas/AdminAccountDetail'
          readOnly: true
        errors:
          nullable: true
      required:
      - data
      - errors
      - message
      - status_code
    AdminAccountList:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        full_name:
          type: string
          nullable: true
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        gender:
          $ref: '#/components/schemas/GenderEnum'
        avatar_url:
          type: string
          format: uri
          maxLength: 1000
        role:
          type: string
          readOnly: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
      required:
      - email
      - id
      - role
    AdminAccountListPage:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdminAccountList'
          readOnly: true
      required:
      - count
      - next
      - previous
      - results
    AdminAccountListResponse:
      type: object
      properties:
        status_code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/AdminAccountListPage'
        errors:
          nullable: true
      required:
      - data
      - errors
      - message
      - status_code
    AdminOTPListPage:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items: {}
      required:
      - count
      - next
      - previous
      - results
    AdminOTPListResponse:
      type: object
      properties:
        status_code:
          type: integer
