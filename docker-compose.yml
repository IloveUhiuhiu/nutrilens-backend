services:
  web:
    build: .
    container_name: nutrilens-backend-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: nutrilens-backend-celery
    # Lightweight default queue (emails, misc tasks).
    command: celery -A core worker --loglevel=info -Q default --concurrency=4
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  celery-ai:
    build: .
    container_name: nutrilens-backend-celery-ai
    # Dedicated AI pipeline queue; low concurrency bounds concurrent load on the
    # AI server.
    command: celery -A core worker --loglevel=info -Q ai --concurrency=2
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nutrilens-backend-redis
    restart: unless-stopped
