services:
  web:
    build: .
    container_name: nutrilens-backend-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Images saved here by the request handler must be visible to the
      # celery/celery-ai containers below — without a shared volume each
      # container has its own local /app/media, so a worker trying to open
      # an image saved by the web process gets FileNotFoundError and the
      # job never reaches the AI server call.
      - media_data:/app/media
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: nutrilens-backend-celery
    # Lightweight default queue (emails, misc tasks).
    command: celery -A core worker --loglevel=info -Q default --concurrency=4
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - redis
    restart: unless-stopped

  celery-ai:
    build: .
    container_name: nutrilens-backend-celery-ai
    # Dedicated AI pipeline queue; low concurrency bounds concurrent load on the
    # AI server.
    command: celery -A core worker --loglevel=info -Q ai --concurrency=2
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nutrilens-backend-redis
    restart: unless-stopped

volumes:
  media_data:
