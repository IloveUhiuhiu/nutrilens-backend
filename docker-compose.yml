services:
  web:
    build: .
    container_name: nutrilens-backend-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: nutrilens-backend-celery
    command: celery -A core worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nutrilens-backend-redis
    restart: unless-stopped
